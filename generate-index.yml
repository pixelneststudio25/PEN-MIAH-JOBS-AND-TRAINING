name: Generate Articles Index
on:
  push:
    paths:
      - 'content/articles/**'
      - 'config.yml'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Generate index
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const articlesDir = './content/articles';
          if (!fs.existsSync(articlesDir)) {
            console.log('Articles directory does not exist, skipping.');
            process.exit(0);
          }
          const files = fs.readdirSync(articlesDir).filter(f => f.endsWith('.md'));
          const articles = files.map(file => {
            const content = fs.readFileSync(path.join(articlesDir, file), 'utf8');
            const slug = file.replace('.md', '');
            const titleMatch = content.match(/title:\s*(.+)/);
            const dateMatch = content.match(/date:\s*(.+)/);
            const categoryMatch = content.match(/category:\s*(.+)/);
            const imageMatch = content.match(/image:\s*(.+)/);
            const excerptMatch = content.match(/excerpt:\s*(.+)/);
            return {
              slug,
              title: titleMatch ? titleMatch[1].trim() : '',
              date: dateMatch ? dateMatch[1].trim() : '',
              category: categoryMatch ? categoryMatch[1].trim() : '',
              image: imageMatch ? imageMatch[1].trim() : '',
              excerpt: excerptMatch ? excerptMatch[1].trim() : ''
            };
          }).sort((a,b) => new Date(b.date) - new Date(a.date));
          fs.writeFileSync('./articles-index.json', JSON.stringify(articles, null, 2));
          "
      - name: Commit changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add articles-index.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Update articles index"
          git push