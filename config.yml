backend:
  name: git-gateway
  branch: main # or master, depending on your default branch

media_folder: "images/uploads" # Media files will be stored in images/uploads
public_folder: "/images/uploads"

collections:
  - name: "articles" # Used in routes, e.g., /admin/collections/articles
    label: "Articles" # Used in the UI
    folder: "content/articles" # The path to the folder where the documents are stored
    create: true # Allow users to create new documents
    slug: "{{slug}}" # Filename template, e.g., title becomes title.md
    fields: # The fields for each document
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Author", name: "author", widget: "string", default: "PEN-MIAH" }
      - { label: "Publication Date", name: "date", widget: "datetime", format: "YYYY-MM-DD" }
      - { label: "Category", name: "category", widget: "select", options: ["Interview Tips", "Work Ethics", "Career Advice", "Workplace Culture"] }
      - { label: "Featured Image", name: "image", widget: "image" }
      - { label: "Excerpt", name: "excerpt", widget: "text", required: false }

      - { label: "Body", name: "body", widget: "markdown" }
      
