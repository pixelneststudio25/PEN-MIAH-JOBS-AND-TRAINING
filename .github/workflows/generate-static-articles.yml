name: Generate Static Articles

on:
  push:
    paths:
      - 'content/articles/**'
  workflow_dispatch:  # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install showdown js-yaml

      - name: Generate static articles and update index
        run: node generate-static-articles.js

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'actions@github.com'
          git add articles/ articles-index.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Generate static articles"
          git push
